name: Build Windows executable

on:
  push:
    branches: [main]
    paths:
      - "godot-game/**"
      - ".github/workflows/build-windows.yml"
  workflow_dispatch: {}

env:
  # Godot release tags on GitHub use the short "X.Y-stable" form (not
  # "X.Y.Z-stable"), e.g. "4.3-stable" -> Godot_v4.3-stable_linux.x86_64.zip.
  GODOT_VERSION: "4.3"

jobs:
  export-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Godot export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/godot-templates
          key: godot-templates-${{ env.GODOT_VERSION }}

      - name: Download Godot headless + export templates
        run: |
          set -e
          mkdir -p ~/godot-bin
          cd ~/godot-bin
          curl -fL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          sudo ln -sf "$PWD/Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot

      - name: Download export templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ~/godot-templates
          cd ~/godot-templates
          curl -fL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q templates.tpz

      - name: Install export templates
        run: |
          set -e
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          cp -r ~/godot-templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Import project (generates .godot cache)
        working-directory: godot-game
        run: godot --headless --path . --import || true

      - name: Export Windows build
        working-directory: godot-game
        run: |
          mkdir -p build/windows
          godot --headless --path . --export-release "Windows Desktop" build/windows/ArenaTanks.exe

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArenaTanks-Windows
          path: godot-game/build/windows/
          if-no-files-found: error
